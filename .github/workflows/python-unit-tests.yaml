name: Run Unit and Smoke Tests

on:
  workflow_dispatch:
  workflow_call:

  push:
    branches: [ main, dev ]
    paths:
      - '**.py'
      - "pyproject.toml"
      - ".github/workflows/python-unit-tests.yaml"

  pull_request:
    branches: [ main, dev ]
    paths:
      - '**.py'
      - "pyproject.toml"
      - ".github/workflows/python-unit-tests.yaml"

permissions:
  contents: read

jobs:
  unit-tests:
    if: ${{ always() }}
    name: Python ${{ matrix.python_version }} - Unit Tests - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python_version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v7
      with:
        python-version: ${{ matrix.python_version }}
    - name: Install dependencies
      run: uv sync --extra test

    - name: Run unit tests
      run: uv run pytest tests/ --ignore=tests/smoke -v --cov

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v7
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: uv sync --extra test

    - name: Run smoke tests
      run: uv run pytest tests/smoke -m smoke -v
