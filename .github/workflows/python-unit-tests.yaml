name: Run Unit and Smoke Tests

on:
  workflow_dispatch:
  workflow_call:

  push:
    branches: [ main, dev ]
    paths:
      - '**.py'
      - "pyproject.toml"
      - ".github/workflows/python-unit-tests.yaml"

  pull_request:
    branches: [ main, dev ]
    paths:
      - '**.py'
      - "pyproject.toml"
      - ".github/workflows/python-unit-tests.yaml"

permissions:
  contents: read

jobs:
  unit-tests:
    if: ${{ always() }}
    name: Python ${{ matrix.python_version }} - Unit Tests - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python_version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        python-version: ${{ matrix.python_version }}
    - name: Install dependencies
      run: uv sync --extra test

    - name: Run unit tests
      run: uv run pytest tests/ --ignore=tests/smoke -v --cov

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: uv sync --extra test

    - name: Run smoke tests
      continue-on-error: true
      run: uv run pytest tests/smoke -m smoke -v
