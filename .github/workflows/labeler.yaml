name: Pull Request Labeler

on:
  workflow_dispatch:
  pull_request_target:

permissions:
  contents: read
  pull-requests: write

jobs:
  labeler:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6.1.0
