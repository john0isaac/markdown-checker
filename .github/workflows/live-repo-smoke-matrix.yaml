name: Live Repo Smoke Tests (Python Matrix)

on:
  workflow_dispatch:
  push:
    branches: [ main, dev ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  live-repo-smoke-tests:
    if: ${{ always() }} # Always run even if a matrix candidate fails
    name: Live Repo Smoke Tests - Python ${{ matrix.python_version }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      matrix:
        os: [ubuntu-latest]
        python_version: [ "3.11", "3.12", "3.13", "3.14" ]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          prune-cache: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python_version }}

      - name: Clone Testing Repositories
        run: |
          git clone https://github.com/Azure-Samples/azure-search-openai-demo

      - name: Test Check Broken Paths in azure-search-openai-demo
        if: always()
        run: |
          cd azure-search-openai-demo
          uv run --project .. markdown-checker -d . -f check_broken_paths -gu ''

      - name: Test Check URLs Country locale in azure-search-openai-demo
        if: always()
        run: |
          cd azure-search-openai-demo
          uv run --project .. markdown-checker -d . -f check_urls_locale -gu ''

      - name: Test Check Broken URLs in azure-search-openai-demo
        if: always()
        continue-on-error: true
        run: |
          cd azure-search-openai-demo
          uv run --project .. markdown-checker -d . -f check_broken_urls -gu ''
